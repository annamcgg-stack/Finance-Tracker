<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="application-name" content="Finance Tracker" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Finance Tracker" />
    <title>Finance Tracker</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        padding-top: max(1.5rem, env(safe-area-inset-top));
        padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #f1f5f9;
      }
      .card {
        max-width: 24rem;
        width: 100%;
        text-align: center;
        padding: 2rem 1.5rem;
        border-radius: 1rem;
        background: #111827;
        border: 1px solid #334155;
      }
      .logo {
        width: 3.5rem;
        height: 3.5rem;
        margin: 0 auto 1rem;
        border-radius: 0.75rem;
        background: #2563eb;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        font-weight: 700;
        color: #fff;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
        font-weight: 600;
      }
      p {
        margin: 0 0 1.5rem;
        font-size: 0.9375rem;
        line-height: 1.5;
        color: #94a3b8;
      }
      button {
        min-height: 2.75rem;
        padding: 0.625rem 1.25rem;
        border: none;
        border-radius: 0.75rem;
        background: #2563eb;
        color: #fff;
        font-size: 0.9375rem;
        font-weight: 500;
        cursor: pointer;
        width: 100%;
      }
      button:active {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo" aria-hidden="true">F</div>
      <h1>You're offline</h1>
      <p>
        Finance Tracker needs an internet connection to sync your data with Supabase.
        Your private data on this device is safe.
      </p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
